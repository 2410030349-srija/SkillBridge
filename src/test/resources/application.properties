spring.datasource.url=jdbc:h2:mem:skillbridge_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

app.security.admin-key=test-admin-key
app.security.jwt.secret=test-jwt-secret-key-1234567890-abcdef
app.security.jwt.expiration-ms=3600000
app.security.rate-limit.general-per-minute=120
app.security.rate-limit.sensitive-per-minute=30
