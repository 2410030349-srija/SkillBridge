spring.application.name=skillbridge

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/skillbridge_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
app.security.admin-key=${APP_ADMIN_KEY:skillbridge-admin-change-me}
app.security.rate-limit.general-per-minute=${APP_RATE_LIMIT_GENERAL_PER_MINUTE:120}
app.security.rate-limit.sensitive-per-minute=${APP_RATE_LIMIT_SENSITIVE_PER_MINUTE:30}
app.security.jwt.secret=${APP_JWT_SECRET:change-this-to-a-long-random-secret-key-for-prod-1234567890}
app.security.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
server.port=8082
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.FilterChainProxy=DEBUG
