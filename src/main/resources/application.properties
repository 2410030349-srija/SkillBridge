spring.application.name=skillbridge

# Use file-based H2 by default for local development so test data survives restarts
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/skillbridge}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
app.security.admin-key=${APP_ADMIN_KEY:admin-dev-key-very-secret}
app.security.rate-limit.general-per-minute=${APP_RATE_LIMIT_GENERAL_PER_MINUTE:120}
app.security.rate-limit.sensitive-per-minute=${APP_RATE_LIMIT_SENSITIVE_PER_MINUTE:30}
app.security.jwt.secret=${APP_JWT_SECRET:your-development-secret-key-must-be-at-least-32-chars-long-1234}
app.security.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
server.port=${PORT:8082}
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.FilterChainProxy=DEBUG
